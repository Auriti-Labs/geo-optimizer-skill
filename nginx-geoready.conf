# GEO Optimizer Web - Nginx configuration for geoready.dev

upstream geo_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Block 1: HTTP (non-www) → HTTPS non-www ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name geoready.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://geoready.dev$request_uri;
    }
}

# ── Block 2: HTTP www → HTTPS non-www ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.geoready.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://geoready.dev$request_uri;
    }
}

# ── Block 3: HTTPS www → HTTPS non-www ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.geoready.dev;

    ssl_certificate /etc/letsencrypt/live/geoready.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geoready.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/geoready.dev/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    return 301 https://geoready.dev$request_uri;
}

# ── Block 4: HTTPS non-www → serve the app ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name geoready.dev;

    ssl_certificate /etc/letsencrypt/live/geoready.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geoready.dev/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/geoready.dev/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/geoready.dev.access.log;
    error_log /var/log/nginx/geoready.dev.error.log;

    # Block 4a: API endpoints — noindex, proxy to FastAPI
    location /api/ {
        add_header X-Robots-Tag "noindex, nofollow" always;

        proxy_pass http://geo_app;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 4k;
    }

    # Block 4b: Badge endpoint
    location /badge {
        proxy_pass http://geo_app;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Block 4c: Health check
    location /health {
        proxy_pass http://geo_app;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Block 4d: All other requests → FastAPI (serves Astro static + API)
    location / {
        proxy_pass http://geo_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 4k;
    }
}
